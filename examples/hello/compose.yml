# Minimal smoke-test app: one public container, no build/ECR, no managed services.
# nginxdemos/hello serves a page on port 80 that shows the server name and
# request details — handy for proving the request really reached Fargate.
services:
  web:
    image: nginxdemos/hello:plain-text
    ports:
      - 80:80
    networks:
      - public
networks:
  public:
