# composey-doctor: proves real read/write connectivity to every managed service.
#
# minio -> S3, postgres -> RDS, redis -> ElastiCache are all substituted, and
# composey injects each endpoint/credential into the doctor. The doctor is built
# from source (ECR) and its GET /health does a real round-trip against each:
# S3 put+get, Postgres write+read, Redis set+get.
services:
  doctor:
    build:
      context: app
    ports:
      - 80:80
    environment:
      BUCKET_NAME: blobs
      DB_HOST: db
      REDIS_URL: redis://cache:6379
    depends_on:
      - blobs
      - db
      - cache
    networks:
      - public
      - private
    x-composey:
      health_check_grace_period: 120
  blobs:
    image: minio/minio
    networks:
      - private
  db:
    image: postgres:16
    networks:
      - private
  cache:
    image: redis:7
    networks:
      - private
networks:
  public:
  private:
