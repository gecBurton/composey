# Managed object storage: the `blobs` service uses a minio image, so composey
# substitutes an AWS S3 bucket for it (no container runs). Because `web`
# depends_on blobs and has env vars naming the blobs service, composey injects
# the real bucket id / domain and grants the web task s3:* on the bucket.
#
# `web` is a plain public image so the stack actually deploys and serves — it
# doesn't use S3 itself; it's here to prove the substitution + wiring landed.
services:
  web:
    image: nginxdemos/hello:plain-text
    ports:
      - 80:80
    environment:
      BUCKET_NAME: blobs
      S3_ENDPOINT: http://blobs:9000
    depends_on:
      - blobs
    networks:
      - public
  blobs:
    image: minio/minio
    networks:
      - private
networks:
  public:
  private:
